<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['"Inter"', 'system-ui', 'sans-serif'],
          serif: ['"Inter"', 'system-ui', 'sans-serif'],

<style>
  :root{
    --bg: oklch(0.985 0.004 85);
    --bg-warm: oklch(0.965 0.008 75);
    --ink: oklch(0.22 0.03 250);
    --ink-soft: oklch(0.42 0.025 250);
    --ink-mute: oklch(0.58 0.018 250);
    --line: oklch(0.88 0.01 250);
    --line-soft: oklch(0.93 0.008 250);
    --accent: oklch(0.56 0.085 190);
    --accent-ink: oklch(0.38 0.07 190);
    --accent-wash: oklch(0.94 0.025 190);
    --warn: oklch(0.62 0.09 45);
    --warn-wash: oklch(0.95 0.025 45);
    --oerr: oklch(0.55 0.06 280);
    --left: oklch(0.58 0.08 25);
    --right: oklch(0.55 0.08 240);
  }
  html,body{background:var(--bg); color:var(--ink);}
  body{font-family:"Inter",system-ui,sans-serif; font-feature-settings:"ss01","cv11";}
  /* keep .font-serif class mapped to Inter too — display sizes get tighter tracking */
  .font-serif{font-family:"Inter",system-ui,sans-serif; letter-spacing:-0.02em; font-weight:600;}
  .font-mono{font-feature-settings:"zero";}
  .hairline{border-color:var(--line);}
  .hairline-soft{border-color:var(--line-soft);}
  .ink{color:var(--ink);} .ink-soft{color:var(--ink-soft);} .ink-mute{color:var(--ink-mute);}
  .bg-warm{background:var(--bg-warm);}
  .bg-accent{background:var(--accent);} .text-accent{color:var(--accent);}
  .bg-accent-wash{background:var(--accent-wash);}
  .text-accent-ink{color:var(--accent-ink);}
  .dot{width:6px;height:6px;border-radius:99px;display:inline-block;}
  details>summary{list-style:none;cursor:pointer;} details>summary::-webkit-details-marker{display:none;}

  @keyframes pulseRing {
    0%{box-shadow:0 0 0 0 oklch(0.56 0.085 190 / .45);}
    100%{box-shadow:0 0 0 14px oklch(0.56 0.085 190 / 0);}
  }
  .pulse{animation:pulseRing .6s ease-out;}

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fadeUp .3s ease-out; }
</style>
</head>
